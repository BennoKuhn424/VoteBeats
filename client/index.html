<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#7012D4" />

    <title>Speeldit – Be the vibe · Vote on the music</title>
    <meta
      name="description"
      content="Be the vibe. Scan the QR at your table or enter your venue code to vote on the music."
    />
    <link rel="canonical" href="https://speeldit.com/" />

    <!-- Favicons (SVG + PNG + /favicon.ico for Bing/Google crawlers) -->
    <link rel="icon" type="image/svg+xml" href="/speeldit-icon.svg" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/speeldit-logo-transparent.png" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Speeldit" />
    <meta property="og:url" content="https://speeldit.com/" />
    <meta property="og:title" content="Speeldit – Be the vibe · Vote on the music" />
    <meta
      property="og:description"
      content="Be the vibe. Scan the QR at your table or enter your venue code to vote on the music."
    />
    <meta property="og:image" content="https://speeldit.com/speeldit-logo.png" />
    <meta property="og:image:alt" content="Speeldit" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Speeldit – Be the vibe · Vote on the music" />
    <meta
      name="twitter:description"
      content="Be the vibe. Scan the QR at your table or enter your venue code to vote on the music."
    />
    <meta name="twitter:image" content="https://speeldit.com/speeldit-logo.png" />

    <link rel="manifest" href="/site.webmanifest" />

    <!-- iOS PWA (Add to Home Screen) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Speeldit" />
    <link rel="apple-touch-icon" href="/speeldit-logo-transparent.png" />

    <meta name="msapplication-TileColor" content="#7012D4" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://js-cdn.music.apple.com/musickit/v3/musickit.js"></script>
    <!-- Optional on-device console (enable with VITE_ERUDA=1) -->
    <script type="module">
      if (import.meta.env?.VITE_ERUDA === '1') {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/eruda';
        s.onload = () => window.eruda?.init();
        document.body.appendChild(s);
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
